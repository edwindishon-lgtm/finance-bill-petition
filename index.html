<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reject Finance Bill 2026 - Public Action</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #111827);
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 720px;
      background: #111827;
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5);
      text-align: center;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      color: #ef4444;
    }

    p {
      color: #cbd5e1;
      line-height: 1.6;
    }

    .alert {
      background: #1f2937;
      padding: 15px;
      border-radius: 12px;
      margin: 20px 0;
      text-align: left;
    }

    .btn {
      display: inline-block;
      margin: 10px;
      padding: 14px 18px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
    }

    .email { background: #ef4444; color: white; }
    .whatsapp { background: #25D366; color: white; }
    .x { background: #1DA1F2; color: white; }
  </style>
</head>
<body>
  <div class="container">

    <h1>🚨 Reject Finance Bill 2026</h1>

    <p>
      Send your objection during public participation.
    </p>

    <div class="alert">
      <strong>Key Concerns:</strong><br><br>
      • Agency notices during disputes<br>
      • Higher tax burden on businesses<br>
      • Digital payment taxes<br>
      • Mobile phone excise duty<br>
    </div>

    <a class="btn email"
      href="mailto:publicparticipation@parliament.go.ke?subject=REJECT%20FINANCE%20BILL%202026&body=I%20reject%20the%20Finance%20Bill%202026%20and%20urge%20its%20revision.">
      📩 Send Email
    </a>

    <a class="btn whatsapp"
      href="https://wa.me/?text=Reject%20Finance%20Bill%202026%20-%20Send%20your%20objection%20now%20to%20parliament">
      📲 Share WhatsApp
    </a>

    <a class="btn x"
      href="https://twitter.com/intent/tweet?text=I%20reject%20the%20Finance%20Bill%202026%20%23RejectFinanceBill2026">
      🐦 Share X
    </a>

  </div>
</body>
</html>
