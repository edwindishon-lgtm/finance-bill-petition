<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reject Finance Bill 2026 - Public Action</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #111827);
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 720px;
      background: #111827;
      padding: 30px;
      border-radius: 18px;

    }

      margin-bottom: 10px;

    }

    }

      background: #1f2937;
      padding: 15px;
      border-radius: 12px;
      margin: 20px 0;
      text-align: left;
    }

      margin: 10px;

<body>
  <div class="container">

    <h1>🚨 Reject Finance Bill 2026</h1>

    <p>
      Send your objection during public participation.
    </p>

      <strong>Key Concerns:</strong><br><br>

      • Higher tax burden on businesses<br>
      • Digital payment taxes<br>
      • Mobile phone excise duty<br>

    <a class="btn email"

      📩 Send Email
    </a>

    <a class="btn whatsapp"

    </a>

    <a class="btn x"

  </div>
